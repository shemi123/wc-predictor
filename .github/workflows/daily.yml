name: Daily WC Predictions

on:
  schedule:
    # 12:05 AM IST = 6:35 PM UTC (predict tomorrow's matches)
    - cron: "35 18 * * *"
  
    # Every 4 hours (email digest of all predictions)
    # This runs at 2:00 AM, 6:00 AM, 10:00 AM, 2:00 PM, 6:00 PM, 10:00 PM IST
    - cron: "30 */4 * * *"

  workflow_dispatch:

jobs:
  predict:
    name: Submit AI Predictions (12:05 AM IST)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '35 18 * * *'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Run prediction script
        env:
          SUPABASE_REFRESH_TOKEN: ${{ secrets.SUPABASE_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python predict.py

  email_digest:
    name: Send Predictions Email (Every 4 Hours)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 */4 * * *'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Send email digest
        env:
          SUPABASE_REFRESH_TOKEN: ${{ secrets.SUPABASE_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: python email_digest.py