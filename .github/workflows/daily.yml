name: Daily WC Predictions

on:
  schedule:
    # 12:10 AM IST = 6:40 PM UTC (predict tomorrow's matches)
   - cron: "30 12 * * *"
  
    # 6:00 PM IST = 12:30 PM UTC (email digest of all predictions)
    - cron: "30 12 * * *"

  workflow_dispatch:

jobs:
  predict:
    name: Submit AI Predictions (12:10 AM IST)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '40 18 * * *'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Run prediction script
        env:
          SUPABASE_REFRESH_TOKEN: ${{ secrets.SUPABASE_REFRESH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python predict.py

  email_digest:
    name: Send Predictions Email (6:00 PM IST)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 12 * * *'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Send email digest
        env:
          SUPABASE_REFRESH_TOKEN: ${{ secrets.SUPABASE_REFRESH_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: python email_digest.py